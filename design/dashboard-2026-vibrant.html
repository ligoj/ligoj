<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ligoj — Cockpit 2026 · Vibrant (maquette)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f1ec; --surface:#ffffff; --border:#e9e3d8; --border-2:#ddd5c6;
    --ink:#1c1a17; --ink-2:#5a554c; --ink-3:#8d877b; --ink-4:#b4ad9f;
    --ok:#1d9d63; --warn:#d98a16; --err:#df4d42; --idle:#bcb6a8;
    --radius:20px; --font:"Bricolage Grotesque",system-ui,sans-serif; --mono:"JetBrains Mono",monospace;
  }
  *{box-sizing:border-box;} html,body{margin:0;}
  body{font-family:var(--font); color:var(--ink); letter-spacing:-.015em; -webkit-font-smoothing:antialiased;
    background:
      radial-gradient(700px 400px at 0% 0%, rgba(255,153,54,.10), transparent 55%),
      radial-gradient(700px 400px at 100% 0%, rgba(76,141,255,.10), transparent 55%),
      var(--bg);
    background-attachment:fixed; min-height:100vh;}
  .mono{font-family:var(--mono); font-feature-settings:"tnum" 1; letter-spacing:0;}

  header.topbar{position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:18px; padding:14px 30px;
    background:rgba(244,241,236,.78); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border-bottom:1px solid var(--border);}
  .brand{display:flex; align-items:center; gap:11px; font-weight:800; font-size:19px; letter-spacing:-.04em;}
  .brand .mark{width:32px; height:32px; border-radius:11px; display:grid; place-items:center; color:#fff; font-weight:800; font-size:17px;
    background:linear-gradient(135deg,#ff9436,#ff5a52); box-shadow:0 8px 18px -6px rgba(255,90,82,.6); transform:rotate(-5deg);}
  .nav{display:flex; gap:4px; margin-left:8px;}
  .nav a{padding:7px 13px; border-radius:10px; color:var(--ink-2); text-decoration:none; font-weight:600; font-size:14px;}
  .nav a.active{background:#fff; color:var(--ink); box-shadow:0 2px 8px -3px rgba(0,0,0,.12);}
  .spacer{flex:1;}
  .icon-btn{width:38px; height:38px; border-radius:12px; border:1px solid var(--border); background:#fff; display:grid; place-items:center; color:var(--ink-2); cursor:pointer;}
  .icon-btn:hover{color:var(--ink); border-color:var(--border-2);}
  .avatar{display:flex; align-items:center; gap:9px; padding:5px 12px 5px 5px; border:1px solid var(--border); border-radius:40px; background:#fff; cursor:pointer;}
  .avatar .dot{width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,#ff9436,#ff5a52); color:#fff; display:grid; place-items:center; font-weight:700; font-size:12px;}
  .avatar span{font-weight:600; font-size:13px; color:var(--ink-2);}

  main{max-width:1380px; margin:0 auto; padding:32px 30px 80px;}
  .hero{display:flex; align-items:flex-end; justify-content:space-between; gap:24px; margin-bottom:24px; flex-wrap:wrap;}
  .hero h1{font-size:38px; line-height:.98; font-weight:800; letter-spacing:-.045em; margin:0 0 8px;}
  .hero .sub{color:var(--ink-3); font-size:15px; font-weight:500;} .hero .sub b{color:var(--ink-2); font-weight:700;}
  .kpis{display:flex; gap:12px; flex-wrap:wrap;}
  .kpi{border-radius:16px; padding:14px 18px; min-width:120px; color:#fff; position:relative; overflow:hidden;
    background:linear-gradient(135deg, var(--accent), color-mix(in srgb,var(--accent) 70%,black)); box-shadow:0 12px 26px -12px var(--accent);}
  .kpi .v{font-family:var(--mono); font-weight:700; font-size:24px; letter-spacing:-.02em;}
  .kpi .l{font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-top:3px; opacity:.85;}

  .toolbar{display:flex; align-items:center; gap:12px; margin:6px 0 24px; flex-wrap:wrap;}
  .seg{display:flex; background:#fff; border:1px solid var(--border); border-radius:13px; padding:3px; gap:2px;}
  .seg button{border:0; background:transparent; padding:8px 15px; border-radius:10px; cursor:pointer; font-family:var(--font); font-weight:700; font-size:13px; color:var(--ink-2);}
  .seg button.on{background:var(--ink); color:#fff;}
  .search{position:relative; flex:1; min-width:220px; max-width:360px;}
  .search input{width:100%; padding:11px 14px 11px 40px; border-radius:13px; border:1px solid var(--border); background:#fff; font-family:var(--font); font-size:14px; color:var(--ink); outline:none;}
  .search input::placeholder{color:var(--ink-4);}
  .search input:focus{border-color:#ffbf8a; box-shadow:0 0 0 4px rgba(255,148,54,.15);}
  .search svg{position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--ink-4);}
  .tcount{color:var(--ink-3); font-size:13px; font-weight:700; margin-left:auto;}

  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(338px,1fr)); gap:18px;}
  .card{position:relative; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden;
    box-shadow:0 2px 4px rgba(28,26,23,.04); transition:transform .18s cubic-bezier(.2,.7,.3,1),box-shadow .18s;
    opacity:0; transform:translateY(12px); animation:rise .55s cubic-bezier(.2,.7,.3,1) forwards;}
  @keyframes rise{to{opacity:1; transform:none;}}
  .card:hover{transform:translateY(-4px); box-shadow:0 26px 50px -22px color-mix(in srgb,var(--c) 55%,transparent);}
  /* tinted header band = nod to old board energy, but soft */
  .card-head{display:flex; align-items:center; gap:13px; padding:18px 16px 16px;
    background:linear-gradient(180deg, color-mix(in srgb,var(--c) 16%,white), color-mix(in srgb,var(--c) 5%,white));
    border-bottom:1px solid color-mix(in srgb,var(--c) 16%,var(--border));}
  .glyph{width:46px; height:46px; border-radius:14px; flex:none; display:grid; place-items:center; font-weight:800; font-size:20px;
    color:var(--c); background:#fff;
    box-shadow:0 6px 16px -6px color-mix(in srgb,var(--c) 50%,transparent), inset 0 0 0 1px color-mix(in srgb,var(--c) 20%,var(--border));}
  .glyph img{width:64%; height:64%; object-fit:contain; display:block;}
  .glyph.noimg::after{content:attr(data-letter);}
  .card-head .t{flex:1; min-width:0;}
  .card-head .name{font-weight:800; font-size:17px; letter-spacing:-.03em;}
  .card-head .kind{font-size:11.5px; font-weight:700; color:color-mix(in srgb,var(--c) 60%,#555); text-transform:uppercase; letter-spacing:.05em; margin-top:1px;}
  .count{font-family:var(--mono); font-size:12.5px; font-weight:700; color:color-mix(in srgb,var(--c) 75%,black); background:#fff; border:1px solid color-mix(in srgb,var(--c) 22%,var(--border)); border-radius:9px; padding:5px 9px; white-space:nowrap;}
  .count small{opacity:.5;}
  .rows{padding:6px 8px 6px;}
  .row{display:flex; align-items:center; gap:10px; padding:10px 8px; border-radius:11px; cursor:pointer; transition:background .12s;}
  .row:hover{background:color-mix(in srgb,var(--c) 7%,white);} .row+.row{box-shadow:inset 0 1px 0 #f3efe7;}
  .st{width:9px; height:9px; border-radius:50%; flex:none; position:relative;}
  .st::after{content:""; position:absolute; inset:-4px; border-radius:50%; background:currentColor; opacity:.18;}
  .st.ok{background:var(--ok); color:var(--ok);} .st.warn{background:var(--warn); color:var(--warn);}
  .st.err{background:var(--err); color:var(--err);} .st.idle{background:var(--idle); color:var(--idle);}
  .row .rn{flex:1; min-width:0; font-size:13.5px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .pills{display:flex; gap:5px; flex:none;}
  .pill{font-family:var(--mono); font-size:11px; font-weight:600; color:var(--ink-2); background:#faf8f3; border:1px solid var(--border); border-radius:8px; padding:2px 7px;}
  .pill.cost{color:#b85b00; background:#fff3e6; border-color:#ffe0bf;}
  .row .go{color:var(--ink-4); flex:none; opacity:0; transform:translateX(-3px); transition:.15s;}
  .row:hover .go{opacity:1; transform:none;}
  .card-foot{display:flex; align-items:center; justify-content:space-between; gap:8px; padding:8px 16px 16px;}
  .morelink{font-size:12.5px; font-weight:800; color:color-mix(in srgb,var(--c) 65%,black); text-decoration:none;}
  .health{display:flex; align-items:center; gap:6px; font-size:12px; font-weight:700; color:var(--ink-3);}
  .bar{width:86px; height:7px; border-radius:5px; background:#efeae0; overflow:hidden;}
  .bar i{display:block; height:100%; border-radius:5px; background:linear-gradient(90deg,var(--c),color-mix(in srgb,var(--c) 60%,white));}
  .foot-note{text-align:center; color:var(--ink-4); font-size:12.5px; margin-top:40px;}
  .foot-note code{font-family:var(--mono); background:#fff; border:1px solid var(--border); padding:2px 6px; border-radius:6px;}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand"><div class="mark">L</div> Ligoj</div>
  <nav class="nav"><a href="#" class="active">Accueil</a><a href="#">Projets</a><a href="#">Identité</a><a href="#">Administration</a></nav>
  <div class="spacer"></div>
  <button class="icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg></button>
  <button class="icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg></button>
  <div class="avatar"><div class="dot">LA</div><span>ligoj-admin</span></div>
</header>
<main>
  <div class="hero">
    <div><h1>Tableau de bord</h1><div class="sub">Bonjour <b>ligoj-admin</b> — <b>3</b> outils demandent votre attention.</div></div>
    <div class="kpis">
      <div class="kpi" style="--accent:#2f6df6"><div class="v">124</div><div class="l">Projets</div></div>
      <div class="kpi" style="--accent:#1d9d63"><div class="v">18</div><div class="l">Outils</div></div>
      <div class="kpi" style="--accent:#8b5cf6"><div class="v">2 348</div><div class="l">Souscriptions</div></div>
      <div class="kpi" style="--accent:#df4d42"><div class="v">3</div><div class="l">Alertes</div></div>
    </div>
  </div>
  <div class="toolbar">
    <div class="seg"><button class="on">▦ Cartes</button><button>▤ Liste</button></div>
    <div class="seg"><button class="on">Fonctionnel</button><button>Technique</button></div>
    <div class="search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg><input placeholder="Rechercher un projet ou un outil…"/></div>
    <span class="tcount" id="tcount"></span>
  </div>
  <div class="grid" id="grid"></div>
  <div class="foot-note">Maquette statique · thème <b>Vibrant</b> · données fictives — <code>dashboard-2026-vibrant.html</code></div>
</main>
<script>
const TOOLS=[
 {name:'Jira',kind:'Gestion de tickets',c:'#2563eb',glyph:'J',total:649,active:576,health:.82,rows:[{n:'Airbus — Keycopter',s:'ok',p:['38 ouv.','73 clos']},{n:'ANRU — Agora',s:'ok',p:['28 ouv.']},{n:'BNPP — KYC',s:'warn',p:['12 ouv.']},{n:'EDF — Consoweb',s:'ok',p:['185 clos']}]},
 {name:'Jenkins',kind:'Intégration continue',c:'#d33833',glyph:'J',total:292,active:189,health:.61,rows:[{n:'Airbus — Keycopter',s:'ok',p:['#1842']},{n:'BNPP — KYC',s:'err',p:['échec']},{n:'EDF — PPA Sonar',s:'ok',p:['#77']},{n:'EPO — EPO',s:'warn',p:['instable']}]},
 {name:'LDAP',kind:'Annuaire',c:'#15a06a',glyph:'L',total:1896,active:1167,health:.94,rows:[{n:'gfi-support-lille',s:'ok',p:['10 mbr.']},{n:'outils-delivery-core',s:'ok',p:['5 mbr.']},{n:'3suisses-3s-pt',s:'ok',p:['3 mbr.']},{n:'abertis-tareas',s:'idle',p:['5 mbr.']}]},
 {name:'SonarQube',kind:'Qualité de code',c:'#4e9bcd',glyph:'S',total:84,active:49,health:.7,rows:[{n:'bnpp-pse-android',s:'warn',p:['B']},{n:'BNPP — Accueil iPad',s:'ok',p:['A']},{n:'BNPP — KYC',s:'ok',p:['A']},{n:'CA — Caroline',s:'err',p:['C']}]},
 {name:'Confluence',kind:'Documentation',c:'#e6a019',glyph:'C',total:522,active:462,health:.88,rows:[{n:'Espace — Delivery',s:'ok',p:['2.3 k']},{n:'Espace — Archi',s:'ok',p:['912']},{n:'Espace — RH',s:'idle',p:['144']}]},
 {name:'AWS EC2',kind:'Provisioning',c:'#7cb518',glyph:'E',total:177,active:13,health:.55,rows:[{n:'i-06755957da1276',s:'ok',p:['running']},{n:'i-0f9c42a5c54b51',s:'ok',p:['running']},{n:'i-0eb8922dcfe39f',s:'warn',p:['pending']},{n:'i-0ecb5acac04b50',s:'err',p:['stopped']}]},
 {name:'GitLab',kind:'Source & MR',c:'#7759c2',glyph:'G',total:552,active:224,health:.9,rows:[{n:'platform / core',s:'ok',p:['4 MR']},{n:'platform / ui',s:'ok',p:['2 MR']},{n:'infra / terraform',s:'warn',p:['CI…']}]},
 {name:'Provisioning AWS',kind:'Coûts cloud',c:'#ff7a18',glyph:'A',total:20,active:8,health:.76,rows:[{n:'Datasync Framework',s:'ok',p:['8 CPU','303 $'],cost:true},{n:'Loader SAP GP074',s:'warn',p:['428 $'],cost:true},{n:'Digitale2 Carto',s:'ok',p:['992 $'],cost:true}]},
 {name:'Squash TM',kind:'Tests',c:'#e0524a',glyph:'S',total:178,active:155,health:.8,rows:[{n:'Acoss — Portail KPI',s:'ok',p:['120']},{n:'ATR — APS Migration',s:'ok',p:['64']},{n:'Bayer — AnimPlus',s:'warn',p:['à jour ?']}]},
];
// Brand logo slugs (Simple Icons). Tools without a brand icon fall back to a lettermark.
// In a real integration these would be the plugin logos Ligoj already ships.
const SLUG={'Jira':'logos:jira','Jenkins':'logos:jenkins','LDAP':'mdi:folder-account-outline','SonarQube':'logos:sonarqube','Confluence':'logos:confluence','AWS EC2':'logos:aws-ec2','GitLab':'logos:gitlab','Provisioning AWS':'logos:aws','Squash TM':'mdi:clipboard-check-outline'};
// Brand logos (logos:*) are multi-colour; generic mdi:* fall back icons are tinted with the tool colour.
function logoUrl(t){ const s=SLUG[t.name]; if(!s) return 'about:blank'; const tint=s.startsWith('logos:')?'':('&color='+encodeURIComponent(t.c)); return `https://api.iconify.design/${s}.svg?height=30${tint}`; }
const grid=document.getElementById('grid'); const tcount=document.getElementById('tcount');
tcount.textContent=TOOLS.length+' outils · '+TOOLS.reduce((a,t)=>a+t.active,0)+' souscriptions actives';
grid.innerHTML=TOOLS.map((t,i)=>`<article class="card" style="--c:${t.c}; animation-delay:${i*55}ms">
  <div class="card-head"><div class="glyph" data-letter="${t.glyph}"><img src="${logoUrl(t)}" alt="" loading="lazy" onerror="this.remove(); this.parentNode.classList.add('noimg')"></div><div class="t"><div class="name">${t.name}</div><div class="kind">${t.kind}</div></div><div class="count">${t.total.toLocaleString('fr-FR')} <small>/ ${t.active}</small></div></div>
  <div class="rows">${t.rows.map(r=>`<div class="row"><span class="st ${r.s}"></span><span class="rn">${r.n}</span><span class="pills">${r.p.map(p=>`<span class="pill${r.cost?' cost':''}">${p}</span>`).join('')}</span><svg class="go" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m9 6 6 6-6 6"/></svg></div>`).join('')}</div>
  <div class="card-foot"><a class="morelink" href="#">Voir les ${t.total.toLocaleString('fr-FR')} →</a><span class="health"><span class="bar"><i style="width:${Math.round(t.health*100)}%"></i></span>${Math.round(t.health*100)}%</span></div>
</article>`).join('');
</script>
</body>
</html>
