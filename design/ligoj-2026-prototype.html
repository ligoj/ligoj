<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ligoj — Prototype UI 2026 (Vibrant)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* light defaults (Ligoj Light) */
    --bg:#f4f1ec; --surface:#ffffff; --card:#ffffff; --border:#e9e3d8; --border-2:#ddd5c6;
    --ink:#1c1a17; --ink-2:#5a554c; --ink-3:#8d877b; --ink-4:#b4ad9f;
    --thead:#fcfaf6; --hover:#faf7f1; --pill:#faf8f3;
    --ok:#1d9d63; --warn:#d98a16; --err:#df4d42; --idle:#bcb6a8; --accentlink:#2f6df6;
    --bar:#ffffff; --bar-ink:#3b4252; --bar-line:#e7e9ee;
    --primary:#27348a; --primary-2:#1d2768; --primary-active:rgba(255,255,255,.16);
    --seg-on:#1c1a17; --seg-on-ink:#ffffff; --btn1:#ff9436; --btn2:#ff5a52; --focus:rgba(255,148,54,.15); --focus-bd:#ffbf8a;
    --radius:18px;
    --sys:"Roboto",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    --font:"Bricolage Grotesque",system-ui,sans-serif; --mono:"JetBrains Mono",monospace;
    --sidebar-w:264px; --bar-h:56px;
  }
  body[data-theme="ligoj-dark"]{--bg:#12131a; --surface:#1b1d27; --card:#20222e; --border:rgba(255,255,255,.10); --border-2:rgba(255,255,255,.18);
    --ink:#eef1f7; --ink-2:#bcc3d2; --ink-3:#8a92a3; --ink-4:#5e6577; --thead:#232636; --hover:rgba(255,255,255,.04); --pill:rgba(255,255,255,.06);
    --bar:#1b1d27; --bar-ink:#bcc3d2; --bar-line:rgba(255,255,255,.10); --primary:#2c3aa0; --primary-2:#1a2160; --accentlink:#7aa6ff; --seg-on:#3b4ad0; --seg-on-ink:#fff;}
  body[data-theme="solarized"]{--bg:#fdf6e3; --surface:#fffdf3; --card:#fffdf3; --border:#ece3c8; --border-2:#ddd2b2;
    --ink:#3b4b50; --ink-2:#586e75; --ink-3:#93a1a1; --ink-4:#b3bdba; --thead:#f7efd8; --hover:#f7efd8; --pill:#f7efd8;
    --bar:#fffdf3; --bar-ink:#586e75; --bar-line:#ece3c8; --primary:#1f6fa8; --primary-2:#155a8c; --accentlink:#268bd2; --seg-on:#268bd2; --seg-on-ink:#fff;}
  body[data-theme="dracula"]{--bg:#282a36; --surface:#2f3240; --card:#363a4a; --border:rgba(255,255,255,.10); --border-2:rgba(255,255,255,.18);
    --ink:#f8f8f2; --ink-2:#c9cbe0; --ink-3:#969ab5; --ink-4:#666a85; --thead:#363a4a; --hover:rgba(255,255,255,.05); --pill:rgba(255,255,255,.06);
    --bar:#2f3240; --bar-ink:#c9cbe0; --bar-line:rgba(255,255,255,.10); --primary:#44476a; --primary-2:#343750; --accentlink:#bd93f9; --seg-on:#bd93f9; --seg-on-ink:#282a36; --btn1:#ff79c6; --btn2:#bd93f9;}
  body[data-theme="nord"]{--bg:#2e3440; --surface:#3b4252; --card:#434c5e; --border:rgba(255,255,255,.10); --border-2:rgba(255,255,255,.18);
    --ink:#eceff4; --ink-2:#d2d8e3; --ink-3:#9aa3b5; --ink-4:#6b7488; --thead:#434c5e; --hover:rgba(255,255,255,.05); --pill:rgba(255,255,255,.06);
    --bar:#3b4252; --bar-ink:#d2d8e3; --bar-line:rgba(255,255,255,.10); --primary:#434c5e; --primary-2:#2e3440; --accentlink:#88c0d0; --seg-on:#5e81ac; --seg-on-ink:#fff;}
  body[data-theme="github"]{--bg:#f6f8fa; --surface:#ffffff; --card:#ffffff; --border:#d0d7de; --border-2:#bcc4cd;
    --ink:#1f2328; --ink-2:#57606a; --ink-3:#818b98; --ink-4:#aeb6bf; --thead:#f6f8fa; --hover:#f6f8fa; --pill:#f6f8fa;
    --bar:#ffffff; --bar-ink:#57606a; --bar-line:#d0d7de; --primary:#0a5cc0; --primary-2:#084aa0; --accentlink:#0969da; --seg-on:#0969da; --seg-on-ink:#fff; --btn1:#1f883d; --btn2:#1a7f37;}

  *{box-sizing:border-box;} html,body{margin:0;}
  body{font-family:var(--sys); color:var(--ink); -webkit-font-smoothing:antialiased; background:var(--bg); transition:background .25s,color .25s;}
  body.dark .bar img{filter:brightness(0) invert(1) opacity(.8);}
  .mono{font-family:var(--mono); font-feature-settings:"tnum" 1; letter-spacing:0;}

  .sidebar{position:fixed; top:0; left:0; bottom:0; width:var(--sidebar-w); z-index:30; color:rgba(255,255,255,.92);
    background:linear-gradient(180deg,var(--primary),var(--primary-2)); display:flex; flex-direction:column;}
  .brand{display:flex; align-items:center; gap:12px; padding:15px 16px; cursor:pointer;}
  .brand svg{width:32px; height:32px; flex:none; filter:drop-shadow(0 2px 4px rgba(0,0,0,.25));}
  .brand .word{font-size:20px; font-weight:700; letter-spacing:.2px;}
  .sb-div{height:1px; background:rgba(255,255,255,.12);}
  .nav{padding:8px 10px; flex:1; overflow:auto;}
  .nav-item{display:flex; align-items:center; gap:12px; padding:9px 12px; border-radius:8px; color:rgba(255,255,255,.86); text-decoration:none; font-size:14px; font-weight:500; cursor:pointer; margin-bottom:2px; user-select:none;}
  .nav-item img{width:20px; height:20px; opacity:.92;}
  .nav-item:hover{background:rgba(255,255,255,.08);}
  .nav-item.active{background:var(--primary-active); color:#fff; font-weight:600;}
  .nav-item .chev{margin-left:auto; width:16px; height:16px; opacity:.7; transition:transform .2s;}
  .group.open .chev{transform:rotate(180deg);}
  .children{overflow:hidden; max-height:0; transition:max-height .25s ease;}
  .group.open .children{max-height:340px;}
  .children .nav-item{font-size:13.5px; padding-left:30px; color:rgba(255,255,255,.78);}
  .sb-foot{padding:8px 10px;} .ver{margin-left:auto; font-size:11px; opacity:.55; font-family:var(--mono);}

  .bar{position:fixed; top:0; left:var(--sidebar-w); right:0; height:var(--bar-h); z-index:20; display:flex; align-items:center; gap:8px; padding:0 14px; background:var(--bar); border-bottom:1px solid var(--bar-line); box-shadow:0 1px 3px rgba(16,24,40,.06);}
  .bar .ham,.bar .lo{width:40px; height:40px; border:0; background:transparent; border-radius:8px; cursor:pointer; display:grid; place-items:center;}
  .bar .ham:hover,.bar .lo:hover,.bar .user:hover{background:color-mix(in srgb,var(--ink) 8%,transparent);}
  .crumb{color:var(--bar-ink); font-size:15px; font-weight:500; display:flex; align-items:center; gap:7px;}
  .crumb .muted{opacity:.55;} .crumb .sep{opacity:.4;}
  .bar .sp{flex:1;}
  .bar .user{display:flex; align-items:center; gap:7px; padding:7px 12px; border:0; background:transparent; border-radius:8px; cursor:pointer; color:var(--bar-ink); font-family:var(--sys); font-size:14px; font-weight:500;}

  main{margin-left:var(--sidebar-w); padding-top:var(--bar-h); min-height:100vh;}
  .sidebar,.bar,main{transition:transform .22s ease, left .22s ease, margin-left .22s ease;}
  body.nav-collapsed .sidebar{transform:translateX(-100%);}
  body.nav-collapsed .bar{left:0;}
  body.nav-collapsed main{margin-left:0;}
  .crumb span[onclick]:hover{opacity:1; text-decoration:underline;}
  .content{padding:28px 32px 80px; max-width:1440px;}

  .ph{display:flex; align-items:flex-end; justify-content:space-between; gap:20px; margin-bottom:22px; flex-wrap:wrap;}
  .ph h1{font-family:var(--font); font-size:32px; line-height:1; font-weight:800; letter-spacing:-.04em; margin:0 0 7px;}
  .ph .sub{color:var(--ink-3); font-size:14.5px; font-weight:500;} .ph .sub b{color:var(--ink-2); font-weight:700;}
  .btn{display:inline-flex; align-items:center; gap:8px; border:0; cursor:pointer; font-family:var(--font); font-weight:700; font-size:14px; padding:11px 17px; border-radius:12px; color:#fff; background:linear-gradient(135deg,var(--btn1),var(--btn2)); box-shadow:0 10px 22px -10px color-mix(in srgb,var(--btn2) 70%,transparent);}
  .btn:hover{filter:brightness(1.04);} .btn img{width:18px;height:18px;}

  .kpis{display:flex; gap:12px; flex-wrap:wrap;}
  .kpi{border-radius:16px; padding:14px 18px; min-width:118px; color:#fff; position:relative; overflow:hidden; background:linear-gradient(135deg, var(--accent), color-mix(in srgb,var(--accent) 70%,black)); box-shadow:0 12px 26px -12px var(--accent);}
  .kpi .v{font-family:var(--mono); font-weight:700; font-size:23px; letter-spacing:-.02em;}
  .kpi .l{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-top:3px; opacity:.85;}

  .toolbar{display:flex; align-items:center; gap:12px; margin:4px 0 22px; flex-wrap:wrap;}
  .seg{display:flex; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:3px; gap:2px;}
  .seg button{border:0; background:transparent; padding:8px 14px; border-radius:9px; cursor:pointer; font-family:var(--font); font-weight:700; font-size:13px; color:var(--ink-2);}
  .seg button.on{background:var(--seg-on); color:var(--seg-on-ink);}
  .search{position:relative; flex:1; min-width:200px; max-width:340px;}
  .search input{width:100%; padding:10px 14px 10px 38px; border-radius:12px; border:1px solid var(--border); background:var(--surface); font-family:var(--font); font-size:14px; color:var(--ink); outline:none;}
  .search input::placeholder{color:var(--ink-4);}
  .search input:focus{border-color:var(--focus-bd); box-shadow:0 0 0 4px var(--focus);}
  .search img{position:absolute; left:12px; top:50%; transform:translateY(-50%); opacity:.4;}
  .tcount{color:var(--ink-3); font-size:13px; font-weight:700; margin-left:auto;}

  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(338px,1fr)); gap:18px;}
  .card{position:relative; background:var(--card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:0 2px 4px rgba(0,0,0,.05); transition:transform .18s cubic-bezier(.2,.7,.3,1),box-shadow .18s; opacity:0; transform:translateY(12px); animation:rise .5s cubic-bezier(.2,.7,.3,1) forwards; cursor:pointer;}
  @keyframes rise{to{opacity:1; transform:none;}}
  .card:hover{transform:translateY(-4px); box-shadow:0 26px 50px -22px color-mix(in srgb,var(--c) 55%,transparent);}
  .card-head{display:flex; align-items:center; gap:13px; padding:18px 16px 16px; background:linear-gradient(180deg, color-mix(in srgb,var(--c) 16%,var(--card)), color-mix(in srgb,var(--c) 5%,var(--card))); border-bottom:1px solid color-mix(in srgb,var(--c) 16%,var(--border));}
  .glyph{width:46px; height:46px; border-radius:14px; flex:none; display:grid; place-items:center; font-family:var(--font); font-weight:800; font-size:20px; color:var(--c); background:var(--card); box-shadow:0 6px 16px -6px color-mix(in srgb,var(--c) 50%,transparent), inset 0 0 0 1px color-mix(in srgb,var(--c) 22%,var(--border));}
  .glyph img{width:64%; height:64%; object-fit:contain; display:block;} .glyph.noimg::after{content:attr(data-letter);}
  .glyph.sm{width:34px; height:34px; border-radius:10px; font-size:15px;}
  .card-head .t{flex:1; min-width:0;}
  .card-head .name{font-family:var(--font); font-weight:800; font-size:17px; letter-spacing:-.03em; color:var(--ink);}
  .card-head .kind{font-size:11.5px; font-weight:700; color:color-mix(in srgb,var(--c) 55%,var(--ink-3)); text-transform:uppercase; letter-spacing:.05em; margin-top:1px;}
  .count{font-family:var(--mono); font-size:12.5px; font-weight:700; color:color-mix(in srgb,var(--c) 60%,var(--ink)); background:var(--card); border:1px solid color-mix(in srgb,var(--c) 22%,var(--border)); border-radius:9px; padding:5px 9px; white-space:nowrap;}
  .count small{opacity:.5;}
  .rows{padding:6px 8px 6px;}
  .row{display:flex; align-items:center; gap:10px; padding:10px 8px; border-radius:11px; cursor:pointer; transition:background .12s;}
  .row:hover{background:color-mix(in srgb,var(--c) 8%,var(--card));} .row+.row{box-shadow:inset 0 1px 0 var(--border);}
  .st{width:9px; height:9px; border-radius:50%; flex:none; position:relative;}
  .st::after{content:""; position:absolute; inset:-4px; border-radius:50%; background:currentColor; opacity:.18;}
  .st.ok{background:var(--ok); color:var(--ok);} .st.warn{background:var(--warn); color:var(--warn);} .st.err{background:var(--err); color:var(--err);} .st.idle{background:var(--idle); color:var(--idle);}
  .row .rn{flex:1; min-width:0; font-size:13.5px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .pills{display:flex; gap:5px; flex:none;}
  .pill{font-family:var(--mono); font-size:11px; font-weight:600; color:var(--ink-2); background:var(--pill); border:1px solid var(--border); border-radius:8px; padding:2px 7px;}
  .pill.cost{color:#b85b00; background:#fff3e6; border-color:#ffe0bf;}
  .card-foot{display:flex; align-items:center; justify-content:space-between; gap:8px; padding:8px 16px 16px;}
  .morelink{font-size:12.5px; font-weight:800; color:color-mix(in srgb,var(--c) 55%,var(--ink)); text-decoration:none;}
  .health{display:flex; align-items:center; gap:6px; font-size:12px; font-weight:700; color:var(--ink-3);}
  .barh{width:80px; height:7px; border-radius:5px; background:var(--pill); overflow:hidden;}
  .barh i{display:block; height:100%; border-radius:5px; background:linear-gradient(90deg,var(--c),color-mix(in srgb,var(--c) 60%,white));}

  .panel{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:0 2px 6px rgba(0,0,0,.04);}
  .tabs{display:flex; gap:4px; padding:10px 12px 0;}
  .tab{display:flex; align-items:center; gap:8px; padding:9px 16px; border-radius:11px 11px 0 0; cursor:pointer; font-family:var(--font); font-weight:700; font-size:13.5px; color:var(--ink-3);}
  .tab img{width:18px;height:18px; opacity:.7;} .tab.on{color:var(--ink); background:var(--bg);}
  table{width:100%; border-collapse:collapse;}
  thead th{text-align:left; font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-3); padding:14px 16px; border-bottom:1px solid var(--border); background:var(--thead); white-space:nowrap;}
  thead th.end{text-align:right;} thead th.center{text-align:center;}
  tbody td{padding:13px 16px; border-bottom:1px solid var(--border); font-size:13.5px; font-weight:500; color:var(--ink);}
  tbody tr{transition:background .12s; cursor:pointer;} tbody tr:hover{background:var(--hover);} tbody tr:last-child td{border-bottom:0;}
  td.end{text-align:right;} td.center{text-align:center;}
  .chip{display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:700;}
  .chip.ok{background:#e4f6ec; color:#147a4a;} .chip.warn{background:#fdf0db; color:#9a6410;} .chip.err{background:#fbe6e4; color:#a8362e;} .chip.idle{background:#ededed; color:#777;}
  .tagdot{display:inline-flex; align-items:center; gap:7px;} .tagdot .d{width:8px; height:8px; border-radius:50%;}
  .iconbtn{width:32px; height:32px; border-radius:9px; border:1px solid transparent; background:transparent; cursor:pointer; display:inline-grid; place-items:center; vertical-align:middle;}
  .iconbtn:hover{background:var(--hover);} .iconbtn.danger:hover{background:#fbe6e4;} .iconbtn img{width:18px; height:18px;}
  body.dark .iconbtn img, body.dark .tab img, body.dark .search img{filter:brightness(0) invert(1) opacity(.7);}
  /* tooltips (above the icon, like Vuetify v-tooltip) */
  [data-tip]{position:relative;}
  [data-tip]:hover::after{content:attr(data-tip); position:absolute; bottom:calc(100% + 9px); left:50%; transform:translateX(-50%);
    background:#23201a; color:#fff; font-family:var(--sys); font-size:12px; font-weight:600; line-height:1; padding:6px 9px; border-radius:7px;
    white-space:nowrap; z-index:45; pointer-events:none; box-shadow:0 6px 18px -6px rgba(0,0,0,.5); animation:tipin .12s ease;}
  [data-tip]:hover::before{content:""; position:absolute; bottom:calc(100% + 4px); left:50%; transform:translateX(-50%);
    border:5px solid transparent; border-top-color:#23201a; z-index:45; pointer-events:none; animation:tipin .12s ease;}
  @keyframes tipin{from{opacity:0; transform:translateX(-50%) translateY(3px);} to{opacity:1;}}
  .booldot{width:9px; height:9px; border-radius:50%; display:inline-block;}
  .avatar-cell{display:flex; align-items:center; gap:10px;}
  .av{width:30px; height:30px; border-radius:50%; display:grid; place-items:center; color:#fff; font-weight:700; font-size:12px; font-family:var(--mono); flex:none;}
  .sub2{font-size:12px; color:var(--ink-3); font-weight:500;}
  .mails{display:inline-flex; flex-wrap:wrap; gap:5px;}
  .mailchip{display:inline-flex; align-items:center; gap:5px; font-size:12.5px; font-weight:600; color:var(--ink-2); background:var(--pill); border:1px solid var(--border); border-radius:8px; padding:3px 9px;}
  body.dark .mailchip img{filter:brightness(0) invert(1) opacity(.55);}
  .cbx{width:18px; height:18px; border-radius:5px; border:2px solid var(--border-2); display:inline-grid; place-items:center; cursor:pointer; background:var(--surface); vertical-align:middle;}
  .cbx.on{background:var(--accentlink); border-color:var(--accentlink);}
  .cbx.on::after{content:""; width:9px; height:5px; border-left:2px solid #fff; border-bottom:2px solid #fff; transform:rotate(-45deg) translateY(-1px);}
  .popmenu{position:fixed; z-index:55; min-width:200px; background:var(--surface); border:1px solid var(--border); border-radius:12px; box-shadow:0 16px 40px -16px rgba(0,0,0,.4); padding:6px; animation:fade .12s;}
  .popmenu button{display:flex; align-items:center; gap:10px; width:100%; border:0; background:transparent; cursor:pointer; font-family:var(--sys); font-size:13.5px; font-weight:600; color:var(--ink); padding:10px 12px; border-radius:8px; text-align:left;}
  .popmenu button:hover{background:var(--hover);} .popmenu button img{width:18px; height:18px;}
  body.dark .popmenu button img{filter:brightness(0) invert(1) opacity(.7);}
  .toolset{display:flex; align-items:center;} .toolset img{width:22px; height:22px; border-radius:6px; background:var(--card); box-shadow:0 0 0 1px var(--border); padding:2px; margin-left:-6px;} .toolset img:first-child{margin-left:0;}
  .pg{display:flex; align-items:center; justify-content:flex-end; gap:14px; padding:12px 16px; color:var(--ink-3); font-size:13px; font-weight:600;}
  .pg .iconbtn{border:1px solid var(--border);}

  .cols2{display:grid; grid-template-columns:1fr 1fr; gap:18px;} @media(max-width:1000px){.cols2{grid-template-columns:1fr;}}
  .pcard{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; box-shadow:0 2px 6px rgba(0,0,0,.04);}
  .pcard h3{font-family:var(--font); font-weight:800; font-size:18px; margin:0 0 16px; display:flex; align-items:center; gap:10px;}
  body.dark .pcard h3 img, body.dark .pref-row>img{filter:brightness(0) invert(1) opacity(.7);}
  .pref-row{display:flex; align-items:center; gap:14px; padding:12px 0;} .pref-row+.pref-row{border-top:1px solid var(--border);}
  .pref-row .pt{flex:1;} .pref-row .ptt{font-weight:700; font-size:14px;} .pref-row .pth{font-size:12.5px; color:var(--ink-3); margin-top:2px;}
  .switch{width:46px; height:26px; border-radius:20px; background:var(--border-2); position:relative; cursor:pointer; transition:background .2s; flex:none;}
  .switch::after{content:""; position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.25); transition:left .2s;}
  .switch.on{background:var(--ok);} .switch.on::after{left:23px;}
  .themes{display:grid; grid-template-columns:repeat(auto-fill,minmax(124px,1fr)); gap:10px;}
  .tile{border:1px solid var(--border); border-radius:12px; overflow:hidden; cursor:pointer; transition:.15s; background:var(--surface);}
  .tile:hover{transform:translateY(-2px); box-shadow:0 8px 18px -10px rgba(0,0,0,.3);}
  .tile.on{border-color:var(--accentlink); border-width:2px;}
  .tile .sw{display:flex; height:30px;} .tile .sw span{flex:1;}
  .tile .lb{padding:6px 9px; font-size:12px; font-weight:700; display:flex; align-items:center; gap:6px; color:var(--ink);}
  .infoline{display:flex; align-items:center; gap:12px; padding:11px 0;} .infoline+.infoline{border-top:1px solid var(--border);}
  .infoline .k{font-size:13px; color:var(--ink-3); font-weight:600; width:120px;} .infoline .v{font-weight:600; font-size:14px;}
  .rolechip{background:color-mix(in srgb,var(--accentlink) 14%,var(--surface)); color:var(--accentlink); font-size:12px; font-weight:700; padding:3px 10px; border-radius:20px; margin-right:5px;}

  /* login */
  body.auth .sidebar, body.auth .bar{display:none;} body.auth main{margin-left:0; padding-top:0;} body.auth .content{padding:0; max-width:none;}

function renderSidebar(active){
  const grpOpen=(g)=>g.children?.some(c=>c.route===active);
  const item=(it)=>`<a class="nav-item ${it.route===active?'active':''}" onclick="go('${it.route}')"><img src="${ico(it.icon,'white')}"> ${it.label}${it.badge?`<span class="nav-badge">${it.badge}</span>`:''}</a>`;
  let html=`<div class="brand" onclick="go('home')">${LOGO_SVG}<span class="word">Ligoj</span></div><div class="sb-div"></div><div class="nav">`;
  for(const n of NAV){
    if(n.children) html+=`<div class="group ${grpOpen(n)?'open':''}"><a class="nav-item" onclick="toggleGroup(this)"><img src="${ico(n.icon,'white')}"> ${n.label}<img class="chev" src="${ico('chevron-down','white',16)}"></a><div class="children">${n.children.map(item).join('')}</div></div>`;
    else html+=item(n);
  }
  html+=`</div><div class="sb-foot"><div class="sb-div"></div><a class="nav-item ${active==='profile'?'active':''}" onclick="go('profile')"><img src="${ico('account-circle','white')}"> Profil</a><a class="nav-item"><img src="${ico('information-outline','white')}"> À propos<span class="ver">v4.0.2</span></a></div>`;
  document.getElementById('sidebar').innerHTML=html;
}
function toggleGroup(el){ el.parentElement.classList.toggle('open'); }

function pageHeader(title,sub,btn,act){return `<div class="ph"><div><h1>${title}</h1>${sub?`<div class="sub">${sub}</div>`:''}</div>${btn?`<button class="btn" onclick="${act||''}"><img src="${ico('plus','white')}">${btn}</button>`:''}</div>`;}
function listToolbar(ph,tabs){let t=`<div class="toolbar">`; if(tabs)t+=`<div class="seg">${tabs.map((x,i)=>`<button class="${i===0?'on':''}">${x}</button>`).join('')}</div>`; t+=`<div class="search"><img src="${ico('magnify')}" height="16"><input placeholder="${ph||'Rechercher…'}"></div></div>`; return t;}
function table(cols,rows,rr){const head=cols.map(c=>`<th class="${c.align||''}">${c.label}</th>`).join(''); return `<div class="panel"><table><thead><tr>${head}</tr></thead><tbody>${rows.map(rr).join('')}</tbody></table><div class="pg"><span>Lignes : ${rows.length}</span><span>1–${rows.length} sur ${rows.length}</span><span><button class="iconbtn" data-tip="Précédent"><img src="${ico('chevron-left')}"></button><button class="iconbtn" data-tip="Suivant"><img src="${ico('chevron-right')}"></button></span></div></div>`;}
/* CRUD table: leading checkbox column + header tools cog + per-row actions cog. */
function dt(cols,rows,rowFn,kind,total){
  const head=`<th style="width:40px"><span class="cbx" onclick="event.stopPropagation();toggleAllCbx(this)"></span></th>`+cols.map(c=>`<th class="${c.align||''}">${c.label}</th>`).join('')+`<th class="end" style="width:48px"><button class="iconbtn" data-tip="Outils du tableau" onclick="event.stopPropagation();toolsMenu(this)"><img src="${ico('cog')}"></button></th>`;
  const body=rows.map((it,i)=>{const cells=rowFn(it,i); return `<tr data-kind="${kind||''}" data-idx="${i}" ${kind?'onclick="editRowEl(this)"':''}><td style="width:40px"><span class="cbx" onclick="event.stopPropagation();this.classList.toggle('on')"></span></td>`+cells.map((c,ci)=>`<td class="${cols[ci].align||''}">${c}</td>`).join('')+`<td class="end"><button class="iconbtn" data-tip="Actions" onclick="event.stopPropagation();rowMenu(this)"><img src="${ico('cog')}"></button></td></tr>`;}).join('');
  const n=total||rows.length;
  return `<div class="panel"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table><div class="pg"><span>Lignes : ${n.toLocaleString('fr-FR')}</span><span>1–${rows.length} sur ${n.toLocaleString('fr-FR')}</span><span><button class="iconbtn" data-tip="Précédent"><img src="${ico('chevron-left')}"></button><button class="iconbtn" data-tip="Suivant"><img src="${ico('chevron-right')}"></button></span></div></div>`;
}

    <div class="modal-head"><div class="mi"><img src="${ico(icon,'white',22)}"></div><h3>${title}</h3><button class="x" onclick="closeModal()"><img src="${ico('close')}"></button></div>
    <div class="modal-body"><div class="frm">${bodyHtml}</div></div>
    <div class="modal-foot"><button class="btn-ghost" onclick="closeModal()">Annuler</button><button class="btn" onclick="closeModal();toast('Enregistré (démo)')"><img src="${ico('check','white')}">Enregistrer</button></div>
  </div></div>`;
}
function closeModal(){document.getElementById('modal-root').innerHTML='';}
function f(label,inner,hint){return `<div class="f">${label?`<label>${label}</label>`:''}${inner}${hint?`<div class="hint">${hint}</div>`:''}</div>`;}
function checkRow(t,h,on){return `<div class="checkrow" onclick="this.querySelector('.cb').classList.toggle('off')"><span class="cb ${on?'':'off'}"><img src="${ico('check','white',14)}"></span><div><div class="ct">${t}</div><div class="ch">${h}</div></div></div>`;}
function openUserForm(u){const e=!!u; openModal('account-plus', e?'Modifier l’utilisateur':'Nouvel utilisateur',
  f('Identifiant', e?`<input value="${u.login}" disabled>`:`<input placeholder="jdupont">`, e?'':'Identifiant de connexion, non modifiable ensuite')+
  `<div class="two">${f('Prénom',`<input value="${u?u.first:''}" placeholder="Jean">`)}${f('Nom',`<input value="${u?u.last:''}" placeholder="Dupont">`)}</div>`+
  f('Entité',selectEl(['ACME','BNPP','EDF','GFI','Bayer','3Suisses'], u?u.company:'ACME'))+
  f('Emails',chips(u?u.mails:['jean.dupont@acme.com']),'Entrée ou Tab pour valider chaque email')+
  f('Groupes',chips(u&&u.groups.length?u.groups:['delivery-core'])));}
function openGroupForm(g){const e=!!g; openModal('account-multiple-plus', e?'Modifier le groupe':'Nouveau groupe',
  f('Nom', e?`<input value="${g.name}" disabled>`:`<input placeholder="nouveau-groupe">`)+
  f('Portée',selectEl(['Internal','External'], g?g.scope:'Internal'))+
  f('Groupe parent (optionnel)',selectEl(['—','delivery-core','data-platform','support-lille'],'—')));}
function openScopeForm(c){const e=!!c; openModal('shape-plus', e?'Modifier la portée':'Nouvelle portée',
  f('Type',`<div class="seg" style="width:fit-content"><button class="on">Groupe</button><button>Entité</button></div>`)+
  f('Nom',`<input value="${c?c.name:''}" placeholder="Department">`, e?'':'Le chemin LDAP (DN) est généré automatiquement par le backend')+
  (e?f('Chemin LDAP',`<input value="${c.dn}" disabled>`):''));}
function openDelegateForm(d){const e=!!d; openModal('account-arrow-right', e?'Modifier la délégation':'Nouvelle délégation',
  `<div class="two">${f('Type de bénéficiaire',selectEl(['Utilisateur','Groupe','Entité'],'Groupe'))}${f('Bénéficiaire',selectEl(['delivery-core','support-lille','Marie Lefèvre','Paul Bernard'], d?d.recv:'delivery-core'))}</div>`+
  `<div class="two">${f('Type de ressource',selectEl(['Utilisateur','Groupe','Entité','Arborescence'], d?d.type:'Groupe'))}${f('Ressource',selectEl(['projet-kyc','data-platform','ou=external'], d?d.res:'projet-kyc'))}</div>`+
  checkRow('Administration','Peut créer d’autres délégations sur cette ressource', d?d.admin:true)+
  checkRow('Écriture','Peut modifier les membres des groupes concernés', d?d.write:false));}

/* ===== Ligoj AI ===== */
const AI_CAPS=[
 {ic:'cash-multiple',ac:'#16a36a',t:'Estimation financière Cloud',d:'Estime et compare les coûts cloud (AWS, Azure…) de tes souscriptions et projets.',q:'Estime le coût cloud mensuel du projet BNPP — KYC'},
 {ic:'resize',ac:'#2f6df6',t:'Dimensionnement & capacité',d:'Recommande des ajustements CPU / RAM / instances selon l’usage réel.',q:'Optimise la capacité des instances EC2 du projet Datasync Framework'},
 {ic:'lifebuoy',ac:'#e0901a',t:'Assistant troubleshooting',d:'Analyse un incident et propose des pistes de résolution étape par étape.',q:'Le build Jenkins de BNPP — KYC échoue, aide-moi à diagnostiquer'},
 {ic:'account-key',ac:'#7c5cff',t:'Diagnostic d’accès & droits',d:'« Pourquoi un utilisateur n’accède pas à un outil ? » Ligoj vérifie groupes, délégations et droits.',q:'Pourquoi jdupont n’accède pas à Jenkins sur BNPP — KYC ?'},
 {ic:'server-network',ac:'#0ea5a5',t:'Serveur MCP',d:'Connecte Ligoj à un serveur MCP pour exposer son contexte aux agents IA.',q:''},
 {ic:'database-cog',ac:'#db2777',t:'Contexte & sources',d:'Choisis les données Ligoj fournies à l’IA : projets, souscriptions, annuaire, coûts…',q:''},
];
function aiAnswer(q){const s=q.toLowerCase();
 if(s.includes('build')||s.includes('échou'))return `Le build <b>#318</b> de Jenkins (BNPP — KYC) a échoué.<br>Cause probable : <b>timeout de connexion</b> au nœud SonarQube (étape « quality gate »).<br><br>Pistes :<br>1. Vérifier le nœud <b>service:kpi:sonar:acme</b> (statut : Attention)<br>2. Contrôler le token puis relancer l’étape<br>3. Augmenter le timeout à 120s`;
 if(s.includes('jdupont')||s.includes('accède')||s.includes('accès')||s.includes('droit'))return `J’ai vérifié les droits de <b>jdupont</b> sur <b>BNPP — KYC</b> :<br>• Membre de <b>delivery-core</b> <span class="ok">✓</span><br>• Le projet exige le groupe <b>projet-kyc</b> <span class="ko">✗ manquant</span><br>• Aucune délégation <b>Écriture</b> sur la souscription Jenkins <span class="ko">✗</span><br><br><b>Recommandation :</b> ajouter jdupont au groupe <b>projet-kyc</b>, ou créer une délégation Écriture.<div class="act" onclick="toast('Ajout au groupe (démo)')"><img src="${ico('account-plus','white',16)}"> Ajouter au groupe projet-kyc</div>`;
 if(s.includes('coût')||s.includes('cout')||s.includes('estim'))return `Estimation pour <b>BNPP — KYC</b> (souscriptions cloud) :<br>• AWS EC2 — 4 instances : <b>~ 1 480 $/mois</b><br>• Stockage & réseau : ~ 320 $/mois<br>• <b>Total estimé : ~ 1 800 $/mois</b><br><br>💡 2 instances <b>t3.large</b> sous-utilisées (&lt; 15% CPU) → économie potentielle <b>~ 410 $/mois</b>.`;
 if(s.includes('capacité')||s.includes('ec2')||s.includes('dimension')||s.includes('optimise'))return `Analyse de capacité — <b>Datasync Framework</b> :<br>• <b>i-0eb89…</b> : CPU 12%, RAM 28% → <b>downsize</b> t3.xlarge → t3.large<br>• <b>i-0675…</b> : pics CPU 90% → <b>upsize</b> recommandé<br><br>Gain net estimé : <b>~ 230 $/mois</b> à performance équivalente.`;
 return `Avec le contexte Ligoj je peux : estimer des coûts cloud, recommander du dimensionnement, diagnostiquer un accès ou aider à résoudre un incident. Choisis une suggestion ci-dessous.`;
}
function bubble(role,html){return `<div class="msg ${role}"><div class="ava"><img src="${ico(role==='ai'?'creation':'account','white',16)}"></div><div class="bub">${html}</div></div>`;}
function askAI(q){q=(q||'').trim(); if(!q)return; const c=document.getElementById('ai-chat'); if(!c)return;
 c.insertAdjacentHTML('beforeend',bubble('user',q)); const inp=document.getElementById('ai-input'); if(inp)inp.value=''; c.scrollTop=c.scrollHeight;
 const tp=document.createElement('div'); tp.className='msg ai'; tp.innerHTML=`<div class="ava"><img src="${ico('creation','white',16)}"></div><div class="bub">…</div>`; c.appendChild(tp); c.scrollTop=c.scrollHeight;
 setTimeout(()=>{tp.querySelector('.bub').innerHTML=aiAnswer(q); c.scrollTop=c.scrollHeight;},650);
}
function openMcpForm(){openModal('server-network','Configurer le serveur MCP',
  f('Adresse du serveur MCP',`<input value="mcp://ligoj.acme.internal:8765">`)+
  f('Jeton d’authentification',`<input type="password" value="mcp-tok-••••••••">`)+
  f('Modèle',selectEl(['claude-opus-4','claude-sonnet-4','gpt-4o','mistral-large'],'claude-opus-4'))+
  `<div class="f"><label>Contexte exposé à l’IA</label>
    <div class="checkrow" onclick="this.querySelector('.cb').classList.toggle('off')"><span class="cb"><img src="${ico('check','white',14)}"></span><div><div class="ct">Projets & souscriptions</div></div></div>
    <div class="checkrow" style="margin-top:10px" onclick="this.querySelector('.cb').classList.toggle('off')"><span class="cb"><img src="${ico('check','white',14)}"></span><div><div class="ct">Annuaire (groupes, entités, droits)</div></div></div>
    <div class="checkrow" style="margin-top:10px" onclick="this.querySelector('.cb').classList.toggle('off')"><span class="cb"><img src="${ico('check','white',14)}"></span><div><div class="ct">Coûts & métriques cloud</div></div></div>
  </div>`);}
function viewAI(){
  const withQ=AI_CAPS.filter(c=>c.q);
  let h=`<div class="ai-hero"><div><div class="ai-title"><div class="ai-orb"><img src="${ico('creation','white',26)}"></div><h1>Ligoj AI <span class="beta">BÊTA</span></h1></div><div class="ai-sub">Un assistant connecté à votre contexte Ligoj : estimation des coûts cloud, dimensionnement, diagnostic d’accès et troubleshooting — via un serveur MCP.</div></div><button class="btn-ai" onclick="openMcpForm()"><img src="${ico('server-network','white')}">Configurer le serveur MCP</button></div>`;
  h+=`<div class="mcp"><span class="stled"></span><span class="lbl">Serveur MCP connecté</span><span class="mut">mcp://ligoj.acme.internal:8765 · 12 outils exposés</span><span class="pillmodel">claude-opus-4 · 240 ms</span></div>`;
  h+=`<div class="ai-grid">`+AI_CAPS.map(c=>`<div class="ai-card" style="--ac:${c.ac}" ${c.q?`data-q="${c.q}" onclick="askAI(this.dataset.q)"`:`onclick="openMcpForm()"`}><div class="ic"><img src="${ico(c.ic,encodeURIComponent(c.ac),22)}"></div><h4>${c.t}</h4><p>${c.d}</p><span class="cta">${c.q?'Demander à l’IA →':'Configurer →'}</span></div>`).join('')+`</div>`;
  const ex=withQ[3].q;
  h+=`<div class="chatwrap"><div class="chat-h"><div class="ai-orb" style="width:30px;height:30px;border-radius:9px"><img src="${ico('creation','white',18)}"></div>Assistant Ligoj</div>
    <div class="chat" id="ai-chat">${bubble('user',ex)}${bubble('ai',aiAnswer(ex))}</div>
    <div class="sugg">${withQ.map(c=>`<span class="s" data-q="${c.q}" onclick="askAI(this.dataset.q)">${c.t}</span>`).join('')}</div>
    <div class="chat-in"><input id="ai-input" placeholder="Posez une question à Ligoj AI…" onkeydown="if(event.key==='Enter')askAI(this.value)"><button onclick="askAI(document.getElementById('ai-input').value)"><img src="${ico('send','white',20)}"></button></div></div>`;
  return h;
}

function toggleAllCbx(h){const on=h.classList.toggle('on'); h.closest('table').querySelectorAll('tbody .cbx').forEach(c=>c.classList.toggle('on',on));}
function closeMenus(){document.querySelectorAll('.popmenu').forEach(e=>e.remove());}
function popAt(btn,html){closeMenus(); const r=btn.getBoundingClientRect(); const m=document.createElement('div'); m.className='popmenu'; m.style.top=(r.bottom+6)+'px'; m.style.left=Math.max(12,r.right-200)+'px'; m.innerHTML=html; document.body.appendChild(m); setTimeout(()=>document.addEventListener('click',closeMenus,{once:true}),0);}
function toolsMenu(btn){popAt(btn,`<button onclick="toast('Export CSV (démo)');closeMenus()"><img src="${ico('download')}">Exporter en CSV</button><button onclick="toast('Copié (démo)');closeMenus()"><img src="${ico('content-copy')}">Copier le tableau</button>`);}
let menuRow=null;
function rowMenu(btn){menuRow=btn.closest('tr'); popAt(btn,`<button onclick="editFromMenu()"><img src="${ico('pencil')}">Modifier</button><button onclick="toast('Verrouillé (démo)');closeMenus()"><img src="${ico('lock')}">Verrouiller</button><button onclick="askDeleteRow()"><img src="${ico('delete','%23df4d42')}">Supprimer</button>`);}
function openByKind(k,i){if(k==='user')openUserForm(USERS[i]); else if(k==='group')openGroupForm(GROUPS[i]); else if(k==='company')openScopeForm(COMPANIES[i]); else if(k==='delegate')openDelegateForm(DELEGATES[i]);}
function editRowEl(tr){if(tr&&tr.dataset.kind)openByKind(tr.dataset.kind,+tr.dataset.idx);}
function editFromMenu(){const tr=menuRow; closeMenus(); if(tr&&tr.dataset.kind)editRowEl(tr); else toast('Modifier (démo)');}
let confirmCb=null;
function openConfirm(title,msg,cb){confirmCb=cb; document.getElementById('modal-root').innerHTML=`<div class="modal-back" onclick="if(event.target===this)closeModal()"><div class="modal" style="width:440px"><div class="modal-head"><div class="mi" style="background:linear-gradient(135deg,#ef4444,#b91c1c)"><img src="${ico('alert-outline','white',22)}"></div><h3>${title}</h3><button class="x" onclick="closeModal()"><img src="${ico('close')}"></button></div><div class="modal-body"><p style="color:var(--ink-2);font-size:14.5px;line-height:1.55;margin:6px 0 0">${msg}</p></div><div class="modal-foot"><button class="btn-ghost" onclick="closeModal()">Annuler</button><button class="btn" style="background:linear-gradient(135deg,#ef4444,#b91c1c)" onclick="runConfirm()"><img src="${ico('delete','white')}">Supprimer</button></div></div></div>`;}
function runConfirm(){const cb=confirmCb; confirmCb=null; closeModal(); if(cb)cb();}
function askDeleteRow(){const tr=menuRow; closeMenus(); if(!tr)return; const nm=(tr.querySelector('td:nth-child(2)')?.textContent||'cet élément').trim(); openConfirm('Supprimer',`Êtes-vous certain de supprimer <strong class="text-error">${nm}</strong> ? Cette action est irréversible.`,()=>{tr.style.transition='opacity .2s, transform .2s'; tr.style.opacity='0'; tr.style.transform='translateX(14px)'; setTimeout(()=>tr.remove(),200); toast('Supprimé (démo)');});}
let toastT;
function toast(msg){const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2200);}

const ROUTES={
 login:{crumb:[],render:viewLogin}, home:{crumb:['Accueil'],render:viewHome},
 users:{crumb:['Identité','Utilisateurs'],render:viewUsers}, groups:{crumb:['Identité','Groupes'],render:viewGroups},
 companies:{crumb:['Identité','Entités'],render:viewCompanies}, delegates:{crumb:['Identité','Délégués'],render:viewDelegates},
 scopes:{crumb:['Identité','Portées de conteneurs'],render:viewScopes}, projects:{crumb:['Projets'],render:viewProjects},
 project:{crumb:['Projets','BNPP — KYC'],render:viewProject}, ai:{crumb:['Ligoj AI'],render:viewAI}, plugins:{crumb:['Administration','Plugins'],render:viewPlugins},
 nodes:{crumb:['Administration','Nœuds'],render:viewNodes}, config:{crumb:['Administration','Configuration'],render:()=>viewSimple('Configuration','Paramètres système','tune')},
 cache:{crumb:['Administration','Cache'],render:()=>viewSimple('Cache','Cache applicatif','database')}, profile:{crumb:['Profil'],render:viewProfile},
};
function go(route){ closeModal(); location.hash=route; }
function render(){
  const route=(location.hash||'#home').slice(1); const r=ROUTES[route]||ROUTES.home; const isAuth=(route==='login');
  document.body.classList.toggle('auth',isAuth);
  if(!isAuth){ renderSidebar(route in ROUTES?route:'home');
    const L2R={}; for(const [rt,o] of Object.entries(ROUTES)){ if(o.crumb&&o.crumb.length) L2R[o.crumb[o.crumb.length-1]]=rt; }
    document.getElementById('crumb').innerHTML=r.crumb.map((c,i)=>{ const last=i===r.crumb.length-1; const rt=L2R[c]; const click=rt&&!last;
      return `<span class="${last?'':'muted'}"${click?` style="cursor:pointer" onclick="go('${rt}')"`:''}>${c}</span>`+(last?'':'<span class="sep">/</span>'); }).join(' '); }
  const v=document.getElementById('view'); v.innerHTML=r.render();
  if(!isAuth) v.innerHTML+=`<div class="foot-note">Prototype statique · UI 2026 Vibrant dans la coquille Ligoj · données fictives — <code>ligoj-2026-prototype.html</code></div>`;
  window.scrollTo(0,0);
}
document.body.dataset.theme=THEME; document.body.classList.toggle('dark',!!THEMES[THEME].dark);
window.addEventListener('hashchange',render);
render();
</script>
