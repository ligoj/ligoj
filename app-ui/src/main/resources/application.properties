server.port                 = 8080
server.servlet.context-path = /ligoj
server.forward-headers-strategy = FRAMEWORK
spring.web.resources.static-locations = file:${ligoj.home}/statics
server.address              = 0.0.0.0
spring.application.name     = Ligoj WEB
spring.profiles.active      = prod
spring.main.allow-bean-definition-overriding=true
spring.main.allow-circular-references=true

# Jetty
server.compression.enabled=false
server.jetty.max-http-form-post-size=0
server.jetty.threads.max=300
server.jetty.threads.idle-timeout=120000ms

# End-points
ligoj.endpoint             = http://localhost:8081/ligoj-api
ligoj.endpoint.api.url     = ${ligoj.endpoint}/rest
ligoj.endpoint.manage.url  = ${ligoj.endpoint}/manage
ligoj.endpoint.plugins.url = ${ligoj.endpoint}/webjars
ligoj.sso.url              = ${ligoj.endpoint.api.url}/security/login
ligoj.sso.content          = {"name":"%s","password":"%s"}

# Management — the UI container's OWN actuator. The base path MUST stay /actuator
# (the default): /manage is already a proxy servlet forwarding to ligoj-api, so
# the UI app exposes its endpoints under /ligoj/actuator/* instead. Reached by an
# authenticated admin session; surfaces the UI container log to the Logs view.
management.endpoints.web.base-path        = /actuator
management.endpoints.web.exposure.include = logfile,health,info,loggers
management.endpoint.logfile.enabled       = true
# Point the `logfile` endpoint at the Log4j2 rolling file (see log4j2.json:
# ${ligoj.home}/${ligoj.log.file.name}). Spring Boot's `logging.file.name` is
# IGNORED — logging is driven by the custom Log4j2 config, not Boot's default.
management.endpoint.logfile.external-file = ${ligoj.home:target}/${ligoj.log.file.name:ui-rolling.log}

# Security implementation used to load the AuthenticationProvider
# Valid values: ["Rest"], "Trusted", "OAuth2Bff"
# Other implementations value is "Rest"
# For "Trusted" value : org.ligoj.app.http.security.TrustedAuthenticationProvider --> authentication is not checked
security                   = Rest

# Session cookie hardening. `SameSite=Lax` keeps the JSESSIONID off cross-site
# state-changing requests (the CSRF vector — Spring CSRF is disabled for the
# SPA/JSON flow) while staying compatible with OAuth2 redirect logins; HttpOnly
# keeps it out of JavaScript (XSS); Secure is emitted in TLS deployments via
# ligoj.cookie.secure (default false so plain-HTTP local dev keeps working — set
# true in production behind HTTPS; forward-headers-strategy=FRAMEWORK above lets
# it work when TLS is terminated at a reverse proxy).
server.servlet.session.cookie.http-only  = true
server.servlet.session.cookie.same-site  = lax
server.servlet.session.cookie.secure     = ${ligoj.cookie.secure:true}

# OAuth2 authentication provider
# security=OAuth2Bff
# ligoj.security.login.url = /oauth2/authorization/keycloak
# ligoj.security.oauth2.username-attribute = preferred_username
# spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:9083/realms/ligoj
# spring.security.oauth2.client.registration.keycloak.provider=keycloak
# spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
# spring.security.oauth2.client.registration.keycloak.client-id=ligoj
# spring.security.oauth2.client.registration.keycloak.client-secret=wnSkWyToie4ghIgT5pKS6ZmJZqWOTM0w
# spring.security.oauth2.client.registration.keycloak.scope=openid

# Allow API key authentication bypass
ligoj.security.login-by-api-key = false

# Suffix for index and login HTML files
# For "" value : index.html, login.html
# For "-prod" value : index-prod.html, login-prod.html
# When set to "auto" (default value), the suffix is guessed from the way the application is started
# The "auto" environment is replaced by "-prod" when the application is started from "java -jar ...war" command
# Otherwise the auto environment is empty ("").
app-env                    =

# Bonus
spring.banner.location=banner.info
spring.main.banner-mode=LOG