services:
  ligoj-api:
    image: ligoj/ligoj-api:latest
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/ligoj/rest/system"]
      interval: 15s
      timeout: 5s
      retries: 10

  ligoj-vue-dev:
    image: node:22-alpine
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - vue_node_modules:/app/node_modules
    depends_on:
      ligoj-api:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://ligoj-api:8081

volumes:
  vue_node_modules:
