<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<link rel="icon" type="image/x-icon" href="/favicon.ico" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Ligoj</title>
	<!--
    Import map: shared module instances for plugins dynamically loaded at
    runtime from /webjars/{id}/vue/index.js. Plugins are built with `vue`,
    `vue-router`, `pinia`, `vuetify` marked external so they resolve
    through these stable URLs and share the host's instances.
  -->
	<script type="importmap">
    {
      "imports": {
        "vue": "/ligoj/assets/vue.js",
        "vue-router": "/ligoj/assets/router.js",
        "pinia": "/ligoj/assets/pinia.js",
        "vuetify": "/ligoj/assets/vuetify.js",
        "@ligoj/host": "/ligoj/assets/host.js"
      }
    }
  </script>
	<!--
    Boot indicator: a pure CSS spinner shown immediately while main.js
    parses, fetches the session, and pre-loads the required plugins.
    The first thing Vue does on mount is replace `#app`'s children, so
    this disappears the moment the app is ready — no flash, no JS
    needed before paint.
  -->
	<style>
		html,
		body {
			margin: 0;
			height: 100%;
		}

		.ligoj-boot {
			position: fixed;
			inset: 0;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			gap: 16px;
			background: linear-gradient(135deg, #1a237e 0%, #0d47a1 50%, #01579b 100%);
			color: #fff;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
			z-index: 0;
		}

		.ligoj-boot__spinner {
			width: 56px;
			height: 56px;
			border: 4px solid rgba(255, 255, 255, 0.25);
			border-top-color: #fff;
			border-radius: 50%;
			animation: ligoj-spin 0.8s linear infinite;
		}

		.ligoj-boot__text {
			margin: 0;
			font-size: 1rem;
			letter-spacing: 0.04em;
			opacity: 0.85;
		}

		@keyframes ligoj-spin {
			to {
				transform: rotate(360deg);
			}
		}
	</style>
</head>

<body>
	<div id="app">
		<div class="ligoj-boot" role="status" aria-live="polite" aria-label="Loading Ligoj">
			<div class="ligoj-boot__spinner" aria-hidden="true"></div>
			<p class="ligoj-boot__text">Loading…</p>
		</div>
	</div>
	<script type="module" src="./src/main.js"></script>
</body>

</html>
